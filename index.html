<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray App Lab - Global Portal</title>
    
    <script>
        (function() {
            // ユーザーのブラウザ言語を取得
            const browserLang = window.navigator.language.toLowerCase();
            const langKey = browserLang.split('-')[0]; // 'en-US' -> 'en'

            // 言語と遷移先ファイルの対応表 (全12言語)
            const langMap = {
                'ja': 'index_ja.html',      // 日本語
                'en': 'index_en.html',      // 英語
                'es': 'index_es.html',      // スペイン語 (es-419含む)
                'hi': 'index_hi.html',      // ヒンディー語
                'id': 'index_id.html',      // インドネシア語
                'it': 'index_it.html',      // イタリア語
                'ko': 'index_ko.html',      // 韓国語
                'pt': 'index_pt.html',      // ポルトガル語 (pt-BR含む)
                'th': 'index_th.html',      // タイ語
                'vi': 'index_vi.html',      // ベトナム語
                'zh': 'index_zh.html'       // 中国語 (簡体字)
            };

            // 中国語の繁体字 (台湾/香港) の個別判定
            if (browserLang.includes('tw') || browserLang.includes('hk')) {
                langMap['zh'] = 'index_tw.html';
            }

            // 振り分け実行
            const target = langMap[langKey] || langMap['en']; // 見つからない場合は英語をデフォルトに
            
            // 日本語設定以外、かつ遷移先が存在する場合のみリダイレクト
            if (langKey !== 'ja' && target && target !== 'index_ja.html') {
                window.location.replace(target);
            }
        })();
    </script>

    <style>
        :root {
            --bg-cream: #fdfaf5;
            --main-text: #333;
            --accent-color: #d4a373;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-cream);
            color: var(--main-text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #fff;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
            margin: 0;
        }

        .container {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        .ray-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        h2 { font-weight: 300; margin-bottom: 40px; }

        /* 言語選択グリッド */
        .lang-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 40px;
        }

        .lang-btn {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            color: #555;
            font-size: 0.9rem;
            border: 1px solid #eee;
            transition: all 0.2s ease;
        }

        .lang-btn:hover {
            border-color: var(--accent-color);
            background: var(--accent-color);
            color: #fff;
            transform: translateY(-2px);
        }

        footer {
            padding: 30px;
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">RAY APP LAB</div>
</header>

<div class="container">
    <img src="ray-mascot.jpg" alt="Mascot Ray" class="ray-photo">
    <h2>Select Language / 言語を選択</h2>

    <div class="lang-selector">
        <a href="index_ja.html" class="lang-btn">🇯🇵 日本語</a>
        <a href="index_en.html" class="lang-btn">🇺🇸 English</a>
        <a href="index_es.html" class="lang-btn">🇲🇽 Español</a>
        <a href="index_hi.html" class="lang-btn">🇮🇳 हिन्दी</a>
        <a href="index_id.html" class="lang-btn">🇮🇩 Indonesia</a>
        <a href="index_it.html" class="lang-btn">🇮🇹 Italiano</a>
        <a href="index_ko.html" class="lang-btn">🇰🇷 한국어</a>
        <a href="index_pt.html" class="lang-card">🇧🇷 Português</a>
        <a href="index_th.html" class="lang-btn">🇹🇭 ภาษาไทย</a>
        <a href="index_vi.html" class="lang-btn">🇻🇳 Tiếng Việt</a>
        <a href="index_zh.html" class="lang-btn">🇨🇳 简体中文</a>
        <a href="index_tw.html" class="lang-btn">🇹🇼 繁體中文</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 Ray App Lab / Developed by Ito</p>
</footer>

</body>
</html>
