<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ray App Lab - Redirecting...</title>
    <script>
        (function() {
            console.log("--- 転送スクリプト開始 ---");

            // 1. 言語取得
            const browserLang = (navigator.language || navigator.userLanguage).toLowerCase();
            const langKey = browserLang.split('-')[0];
            console.log("判定された言語:", langKey);

            // 2. 対応表
            const langMap = {
                'ja': 'index_ja.html',
                'en': 'index_en.html',
                'es': 'index_es.html',
                'hi': 'index_hi.html',
                'id': 'index_id.html',
                'it': 'index_it.html',
                'ko': 'index_ko.html',
                'pt': 'index_pt.html',
                'th': 'index_th.html',
                'vi': 'index_vi.html',
                'zh': 'index_zh.html'
            };

            // 中国語（繁体字）の特別判定
            if (browserLang.includes('tw') || browserLang.includes('hk')) {
                langMap['zh'] = 'index_tw.html';
            }

            // 3. 転送先の決定
            const target = langMap[langKey] || 'index_en.html';
            console.log("転送先ファイル:", target);

            // 4. 現在のURLを確認して転送実行
            const path = window.location.pathname;
            console.log("現在のパス:", path);

            // index_ja.html などに「既にいる」場合は転送しない（無限ループ防止）
            if (!path.includes('index_ja.html') && 
                !path.includes('index_en.html') && 
                !path.includes('index_es.html')) {
                
                console.log(target + " へジャンプします...");
                window.location.replace(target);
            } else {
                console.log("既に言語別ページにいるため、転送を停止しました。");
            }
        })();
    </script>
</head>
<body>
    <div style="text-align: center; padding-top: 50px; font-family: sans-serif;">
        <p>Redirecting... / 転送中...</p>
        <p>If not redirected: <a href="index_ja.html">Japanese</a> / <a href="index_en.html">English</a></p>
    </div>
</body>
</html>
