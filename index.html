<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ray App Lab - Redirecting...</title>
    <script>
        (function() {
            // 1. ブラウザの言語設定を取得
            const browserLang = (navigator.language || navigator.userLanguage).toLowerCase();
            const langKey = browserLang.split('-')[0];

            // 2. 言語とファイルの対応表
            const langMap = {
                'ja': 'index_ja.html',
                'en': 'index_en.html',
                'es': 'index_es.html',
                'hi': 'index_hi.html',
                'id': 'index_id.html',
                'it': 'index_it.html',
                'ko': 'index_ko.html',
                'pt': 'index_pt.html',
                'th': 'index_th.html',
                'vi': 'index_vi.html',
                'zh': 'index_zh.html'
            };

            // 中国語（繁体字）の判定
            if (browserLang.includes('tw') || browserLang.includes('hk')) {
                langMap['zh'] = 'index_tw.html';
            }

            // 3. 転送先の決定（不明な言語は英語へ）
            const target = langMap[langKey] || 'index_en.html';

            // 4. 強制転送（今いるのが index.html もしくはディレクトリ TOP なら実行）
            // ネット上の反映を確実にするため、相対パスで指定します
            if (window.location.pathname.indexOf(target) === -1) {
                window.location.replace(target);
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting... / 転送中...</p>
    <p>If you are not redirected, please click your language:</p>
    <ul>
        <li><a href="index_ja.html">日本語</a></li>
        <li><a href="index_en.html">English</a></li>
    </ul>
</body>
</html>
