<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ray App Lab - Redirecting...</title>
    <script>
        (function() {
            // 1. ブラウザの言語を取得
            const browserLang = window.navigator.language.toLowerCase();
            const langKey = browserLang.split('-')[0];

            // 2. 言語とファイルの対応表
            const langMap = {
                'ja': 'index_ja.html',
                'en': 'index_en.html',
                'es': 'index_es.html',
                'hi': 'index_hi.html',
                'id': 'index_id.html',
                'it': 'index_it.html',
                'ko': 'index_ko.html',
                'pt': 'index_pt.html',
                'th': 'index_th.html',
                'vi': 'index_vi.html',
                'zh': 'index_zh.html'
            };

            // 中国語（繁体字）の判定
            if (browserLang.includes('tw') || browserLang.includes('hk')) {
                langMap['zh'] = 'index_tw.html';
            }

            // 3. 転送先の決定（対応してない言語は英語へ）
            const target = langMap[langKey] || 'index_en.html';

            // 4. 実行（今いるのが index.html なら転送する）
            // ※無限ループ防止のため、自分自身（index.html）への転送は避ける
            if (window.location.pathname.endsWith('index.html') || window.location.pathname.endsWith('/')) {
                window.location.replace(target);
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting... / 転送中...</p>
    <p>If not redirected, click here: <a href="index_ja.html">日本語</a> / <a href="index_en.html">English</a></p>
</body>
</html>
